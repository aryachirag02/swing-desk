name: Daily swing update
on:
  schedule:
    - cron: '45 13 * * 1-5'   # 13:45 UTC = 7:15 pm IST, Mon-Fri (after NSE close)
  workflow_dispatch: {}        # adds a "Run workflow" button for manual runs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch fresh 2y data from Yahoo
        run: python fetch_data.py

      - name: Earnings dates (Fridays only - slow)
        run: |
          if [ "$(date -u +%u)" = "5" ]; then python fetch_data.py --earnings; fi

      - name: Monthly re-tune with overfit guard (1st-3rd of month)
        run: |
          if [ "$(date -u +%d)" -le "07" ] && [ "$(date -u +%u)" = "1" ]; then python backtest.py --tune; else python backtest.py; fi

      - name: Build dashboard + brief
        run: |
          python run_daily.py

      - name: Commit results back to the repo
        run: |
          git config user.name "swing-bot"
          git config user.email "bot@users.noreply.github.com"
          git add dashboard.html brief.md backtest_summary.json backtest_report.md data/earnings.csv data/meta.csv data/flows.csv params_tuned.json 2>/dev/null || true
          git commit -m "Daily update $(date -u +%F)" || echo "nothing to commit"
          git push
