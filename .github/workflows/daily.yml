name: Daily swing update
on:
  schedule:
    - cron: '45 3-9 * * 1-5'   # hourly 9:15am-3:15pm IST during market hours
    - cron: '30 10 * * 1-5'    # 4:00 pm IST - right after market close
    - cron: '30 14 * * 1-5'    # 8:00 pm IST - main evening run (intel)
    - cron: '30 16 * * 1-5'    # 10:00 pm IST - backup if Yahoo was late
  push:
    paths:
      - 'tradelog.json'        # a trade was logged -> refresh + portfolio review
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: swing-desk-daily
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch fresh 2y data from Yahoo
        run: python fetch_data.py

      - name: Earnings dates (Fridays only - slow)
        run: |
          if [ "$(date -u +%u)" = "5" ]; then python fetch_data.py --earnings; fi

      - name: Monthly re-tune with overfit guard (first Monday)
        run: |
          if [ "$(date -u +%d)" -le "07" ] && [ "$(date -u +%u)" = "1" ]; then python backtest.py --tune; else python backtest.py; fi

      - name: Market intelligence + portfolio review (needs ANTHROPIC_API_KEY secret)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INTEL_MAX_STOCKS: "30"
          INTEL_ACCUM: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
          EVT: ${{ github.event_name }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            H=$(date -u +%H)
            if [ "$H" = "10" ] || [ "$H" = "14" ] || [ "$H" = "16" ] || [ "$EVT" = "workflow_dispatch" ]; then
              python intel.py || echo "intel failed - continuing without it"
              if [ "$(date -u +%u)" = "5" ]; then python intel.py --themes || echo "themes failed"; fi
            fi
            if [ "$(date -u +%u)" = "5" ] || [ "$EVT" = "workflow_dispatch" ] || [ "$EVT" = "push" ]; then
              python intel.py --portfolio || echo "pf review failed"
            fi
          else
            echo "no API key - AI steps skipped"
          fi

      - name: Build dashboard + brief
        run: |
          python run_daily.py
          cp dashboard.html index.html

      - name: Healthcheck (self-audit, non-blocking)
        run: python healthcheck.py || echo "::warning::healthcheck reported issues — see log above"

      - name: Commit results back to the repo
        run: |
          git config user.name "swing-bot"
          git config user.email "bot@users.noreply.github.com"
          for f in dashboard.html index.html brief.md backtest_summary.json backtest_report.md data/earnings.csv data/meta.csv data/flows.csv data/indices.csv data/mc_meta.csv data/watchlist.txt data/user_watchlist.txt data/mc_paper.csv data/intel.md data/intel.json data/themes.md data/portfolio_review.json data/portfolio_review.md data/ai_calls.csv data/theme_map.json params_tuned.json; do
            if [ -f "$f" ]; then git add "$f"; fi
          done
          git commit -m "Daily update $(date -u +%F)" || echo "nothing to commit"
          git pull --rebase origin main || true
          git push || (git pull --rebase origin main && git push)
