name: Daily swing update
on:
schedule:
    - cron: '30 10 * * 1-5'   # 4:00 pm IST - right after market close
    - cron: '30 14 * * 1-5'   # 8:00 pm IST - main evening run
    - cron: '30 16 * * 1-5'   # 10:00 pm IST - backup if Yahoo was late
  workflow_dispatch: {}        # adds a "Run workflow" button for manual runs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch fresh 2y data from Yahoo
        run: python fetch_data.py

      - name: Earnings dates (Fridays only - slow)
        run: |
          if [ "$(date -u +%u)" = "5" ]; then python fetch_data.py --earnings; fi

      - name: Monthly re-tune with overfit guard (first Monday)
        run: |
          if [ "$(date -u +%d)" -le "07" ] && [ "$(date -u +%u)" = "1" ]; then python backtest.py --tune; else python backtest.py; fi

 - name: Build dashboard + brief
        run: |
          python run_daily.py
          cp dashboard.html index.html

      - name: Commit results back to the repo
        run: |
          git config user.name "swing-bot"
          git config user.email "bot@users.noreply.github.com"
          for f in dashboard.html index.html brief.md backtest_summary.json backtest_report.md data/earnings.csv data/meta.csv data/flows.csv data/indices.csv params_tuned.json; do
            if [ -f "$f" ]; then git add "$f"; fi
          done
          git commit -m "Daily update $(date -u +%F)" || echo "nothing to commit"
          git push
